<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpez - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-pino {
            background-color: #062e26 !important;
        }

        .btn-pino {
            background-color: #062e26 !important;
            color: white !important;
        }

        .img-cuadrada {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }

        .hidden {
            display: none;
        }

        .card-joya {
            font-size: 0.85rem;
            border: none;
            transition: 0.2s;
        }

        .card-joya:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body class="bg-light">
    <div id="header-container"></div>

    <div class="container mt-4">
        <section id="vista-inventario">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="mb-3">Registrar / Editar Pieza</h5>
                    <div class="row g-2">
                        <div class="col-md-2"><input type="text" id="nombreJoya" class="form-control"
                                placeholder="Nombre"></div>
                        <div class="col-md-2">
                            <select id="categoriaJoya" class="form-select">
                                <option value="Cadena">Cadena</option>
                                <option value="Aretes">Aretes</option>
                                <option value="Pulseras">Pulseras</option>
                                <option value="Balines">Balines</option>
                                <option value="Herrajes">Herrajes</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select id="materialJoya" class="form-select">
                                <option value="Oro Laminado">Oro Laminado</option>
                                <option value="Plata Ley 925">Plata Ley 925</option>
                            </select>
                        </div>
                        <div class="col-md-2"><input type="text" id="imagenJoya" class="form-control"
                                placeholder="Imagen (anillo.png)"></div>
                        <div class="col-md-1"><input type="number" id="costoJoya" class="form-control"
                                placeholder="Costo"></div>
                        <div class="col-md-1"><input type="number" id="precioJoya" class="form-control"
                                placeholder="Venta"></div>
                        <div class="col-md-1"><input type="number" id="stockJoya" class="form-control"
                                placeholder="Stock"></div>
                        <div class="col-md-1">
                            <button class="btn btn-pino w-100" id="btnGuardar" onclick="agregarProducto()">OK</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between mb-3">
                <h3>Inventario Real</h3>
                <button id="btnVisibilidad" class="btn btn-sm btn-outline-secondary" onclick="alternarCostos()">👁️ Ver
                    Costos</button>
            </div>
            <div class="row" id="contenedorInventario"></div>
        </section>

        <section id="vista-ventas" class="hidden">
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm">
                        <h5>Nueva Venta</h5>
                        <input type="text" id="clienteNombre" class="form-control mb-2" placeholder="Cliente">
                        <input type="text" id="clienteTel" class="form-control mb-2" placeholder="Teléfono">

                        <select id="seleccionarProducto" class="form-select mb-2"></select>
                        <div class="row g-2 mb-2">
                            <div class="col-12">
                                <input type="number" id="ventaCantidad" class="form-control" value="1"
                                    placeholder="Cantidad">
                            </div>
                        </div>
                        <button class="btn btn-pino w-100" onclick="agregarAlCarrito()">+ Carrito</button>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card p-3 shadow-sm">
                        <table class="table">
                            <tbody id="listaCarrito"></tbody>
                        </table>

                        <div class="d-flex justify-content-end align-items-center gap-2 mb-2">
                            <span>Precio Final (Ajustado):</span>
                            <input type="number" id="precioFinalAjustado" class="form-control" style="width: 150px;"
                                placeholder="Total Venta" oninput="renderizarCarrito()">
                        </div>
                        <h4 class="text-end" id="totalVentaDisplay">Total: $0</h4>

                        <h4 class="text-end" id="totalVenta">Total: $0</h4>
                        <button class="btn btn-success w-100" onclick="finalizarVenta()">Cerrar Venta</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="vista-balance" class="hidden text-center">
            <div class="row g-3">
                <div class="col-md-3">
                    <div class="card p-4 bg-pino text-white">
                        <h5>Inversión</h5>
                        <h2 id="balInversion">$0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-4 bg-secondary text-white">
                        <h5>Costo Vendido</h5>
                        <h2 id="balCostoVentas">$0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-4 bg-success text-white">
                        <h5>Ventas</h5>
                        <h2 id="balVentas">$0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-4 bg-primary text-white">
                        <h5>Ganancia</h5>
                        <h2 id="balGanancia">$0</h2>
                    </div>
                </div>
            </div>
        </section>

        <section id="vista-historial" class="hidden">
            <div class="card shadow-sm p-3">
                <h5>Historial de Ventas</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Cliente</th>
                                <th>Productos</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="listaHistorial"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="vista-gastos" class="hidden">
            <div class="card shadow-sm p-3 mb-4">
                <h5>Registrar Nuevo Gasto</h5>
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" id="gastoDesc" class="form-control"
                            placeholder="Descripción (ej: Publicidad, Empaques)">
                    </div>
                    <div class="col-md-3">
                        <input type="number" id="gastoMonto" class="form-control" placeholder="Monto $">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-danger w-100" onclick="agregarGasto()">Registrar Gasto</button>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm p-3">
                <h5>Historial de Gastos</h5>
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Descripción</th>
                            <th class="text-end">Monto</th>
                        </tr>
                    </thead>
                    <tbody id="listaGastos"></tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="Admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
