<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpez - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-pino {
            background-color: #062e26 !important;
        }

        .btn-pino {
            background-color: #062e26 !important;
            color: white !important;
        }

        .img-cuadrada {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }

        .hidden {
            display: none;
        }

        .card-joya {
            font-size: 0.85rem;
            border: none;
            transition: 0.2s;
        }

        .card-joya:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body class="bg-light">
    <div id="header-container"></div>

    <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    <div class="modal fade" id="appModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-pino text-white">
                    <h5 class="modal-title" id="appModalLabel">Aviso</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="appModalBody"></div>
                <div class="modal-footer" id="appModalFooter"></div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div id="views-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/inventario.js"></script>
    <script src="scripts/ventas.js"></script>
    <script src="scripts/historial.js"></script>
    <script src="scripts/balance.js"></script>
    <script src="Admin.js"></script>
</body>

</html>
