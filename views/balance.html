<section id="vista-balance" class="hidden">
    <div class="row justify-content-center align-items-stretch gx-3 gy-3 mb-4">
        <div class="col-6 col-sm-4 col-md-3 col-lg-2 d-flex">
            <div class="card p-4 bg-pino text-white text-center w-100 h-100">
                <h5 class="small">Inversión (Stock Actual)</h5>
                <h2 id="balInversion">$0</h2>
            </div>
        </div>
        <div class="col-6 col-sm-4 col-md-3 col-lg-2 d-flex">
            <div class="card p-4 bg-secondary text-white text-center w-100 h-100">
                <h5 class="small">Total Costos (Vendido)</h5>
                <h2 id="balCostoVentas">$0</h2>
            </div>
        </div>
        <div class="col-6 col-sm-4 col-md-3 col-lg-2 d-flex">
            <div class="card p-4 bg-success text-white text-center w-100 h-100">
                <h5 class="small">Ventas Totales</h5>
                <h2 id="balVentas">$0</h2>
            </div>
        </div>
        <div class="col-6 col-sm-4 col-md-3 col-lg-2 d-flex">
            <div class="card p-4 bg-primary text-white text-center w-100 h-100">
                <h5 class="small">Ganancia Real</h5>
                <h2 id="balGanancia">$0</h2>
            </div>
        </div>
        <div class="col-6 col-sm-4 col-md-3 col-lg-2 d-flex">
            <div class="card p-4 bg-info text-white text-center w-100 h-100">
                <h5 class="small">Dinero Disponible</h5>
                <h2 id="balDisponible">$0</h2>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm p-3 mb-3 text-start">
                <h6>💸 Registrar Gasto</h6>
                <div class="mb-2">
                    <input type="text" id="gastoDesc" class="form-control form-control-sm" placeholder="¿En qué se gastó?">
                </div>
                <div class="input-group input-group-sm mb-2">
                    <span class="input-group-text">$</span>
                    <input type="number" id="gastoMonto" class="form-control" placeholder="Monto">
                    <button class="btn btn-danger" onclick="agregarGasto(this)">Añadir</button>
                </div>
                <small class="text-muted">Esto se descontará del dinero disponible, no de la ganancia principal.</small>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm p-3 text-start">
                <h6>📜 Historial de Gastos</h6>
                <div class="table-responsive" style="max-height: 200px;">
                    <table class="table table-sm table-hover">
                        <thead>
                            <tr class="small">
                                <th>Fecha</th>
                                <th>Concepto</th>
                                <th class="text-end">Monto</th>
                            </tr>
                        </thead>
                        <tbody id="listaGastos" class="small"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
