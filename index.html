<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyería Alpez - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-pino {
            background-color: #062e26 !important;
        }

        .header-cliente {
            background-color: #062e26;
            color: white;
            padding: 2rem 0;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .img-cuadrada {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }

        .card-joya {
            transition: transform 0.2s;
            border: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .card-joya:hover {
            transform: scale(1.03);
        }

        .precio-cliente {
            color: #062e26;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .material-tag {
            color: #014421;
            text-transform: uppercase;
            font-weight: bold;
            border-bottom: 2px solid #062e26;
            padding-bottom: 5px;
            margin-top: 2rem;
        }
    </style>
</head>

<body class="bg-light">

    <header class="header-cliente">
        <h1 class="fw-bold">JOYERÍA ALPEZ</h1>
        <p class="mb-0">Catálogo Exclusivo</p>
    </header>

    <div class="container mb-5">
        <div id="contenedorCatalogo" class="row">
            <div class="text-center mt-5">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2">Cargando catálogo...</p>
            </div>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE SCRIPT
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzzICRBYCAA9FoMnmSYRO08hqVSt4og7355164ttlzapuglBgmFnx5_0DlCEwBj4NSFwg/exec";

        async function cargarCatalogo() {
            try {
                const respuesta = await fetch(URL_SCRIPT);
                const datos = await respuesta.json();
                const inventario = datos.inventario;
                renderizar(inventario);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('contenedorCatalogo').innerHTML = "<p class='text-center'>Error al cargar el catálogo.</p>";
            }
        }

        function renderizar(inventario) {
            const contenedor = document.getElementById('contenedorCatalogo');
            contenedor.innerHTML = '';

            // Sacamos los materiales para agrupar
            const materiales = [...new Set(inventario.map(j => j.material || "Otros"))];

            materiales.forEach(mat => {
                // Solo mostrar joyas con stock mayor a 0 para el cliente
                const joyas = inventario.filter(j => j.material === mat && parseInt(j.stock) > 0);

                if (joyas.length > 0) {
                    contenedor.innerHTML += `
                        <div class="col-12">
                            <h4 class="material-tag">✨ ${mat}</h4>
                        </div>`;

                    joyas.forEach(joya => {
                        const precio = parseInt(joya.precio) || 0;
                        contenedor.innerHTML += `
                            <div class="col-6 col-md-3 mb-4">
                                <div class="card card-joya h-100">
                                    <img src="${joya.imagen || 'https://via.placeholder.com/400?text=Joya'}" class="img-cuadrada">
                                    <div class="card-body text-center p-3">
                                        <h6 class="mb-1 text-truncate">${joya.nombre}</h6>
                                        <p class="precio-cliente mb-0">$${precio.toLocaleString()}</p>
                                        <small class="text-muted">${joya.categoria}</small>
                                    </div>
                                </div>
                            </div>`;
                    });
                }
            });
        }

        cargarCatalogo();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
